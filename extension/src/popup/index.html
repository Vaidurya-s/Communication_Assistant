<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comms Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d1016; --panel: #12151c; --panel-2: #171b24; --border: #242a36;
        --hair: rgba(255,255,255,0.07); --text: #e8eaf1; --muted: #8b92a4; --faint: #5a6072;
        --accent: #5b9dff; --accent-2: #2f6fe0; --accent-soft: rgba(91,157,255,0.14);
        --accent-glow: rgba(91,157,255,0.4); --ok: #4cd08a; --ok-soft: rgba(76,208,138,0.14);
        --font: "Hanken Grotesk", "Segoe UI", system-ui, -apple-system, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        width: 380px; min-height: 230px;
        background: radial-gradient(120% 80% at 100% 0%, rgba(47,111,224,0.13), transparent 58%), var(--bg);
        color: var(--text); font-family: var(--font); font-size: 13px; letter-spacing: -0.005em;
        -webkit-font-smoothing: antialiased;
      }
      #root { padding: 18px; }
      .pop-head { display: flex; align-items: center; gap: 11px; margin-bottom: 13px; }
      .pop-brand {
        width: 34px; height: 34px; border-radius: 9px; flex: none; display: grid; place-items: center; color: #fff;
        background: linear-gradient(140deg, var(--accent), var(--accent-2)); box-shadow: 0 6px 16px -6px var(--accent-glow);
      }
      .pop-kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); }
      .pop-title { margin: 1px 0 0; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
      .pop-desc { margin: 0 0 15px; color: var(--muted); font-size: 12.5px; line-height: 1.5; }
      .pop-label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 12.5px; }
      .pop-hint { color: var(--faint); font-weight: 400; }
      .pop-row { display: flex; gap: 8px; }
      .pop-input {
        flex: 1; padding: 9px 11px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
        color: var(--text); font: inherit; font-size: 12.5px; transition: border-color 0.15s, box-shadow 0.15s;
      }
      .pop-input::placeholder { color: var(--faint); }
      .pop-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      .pop-btn {
        padding: 9px 16px; border-radius: 9px; border: 1px solid var(--accent); background: var(--accent); color: #fff;
        font: 600 12.5px var(--font); cursor: pointer; box-shadow: 0 8px 18px -10px var(--accent-glow); transition: 0.15s; white-space: nowrap;
      }
      .pop-btn:hover { background: var(--accent-2); transform: translateY(-1px); }
      .pop-btn-block { width: 100%; padding: 10px 16px; }
      .pop-substatus { margin-top: 8px; font-size: 12px; color: var(--muted); }
      .pop-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
      .pop-status {
        margin-top: 14px; padding: 10px 12px; background: var(--panel); border: 1px solid var(--border);
        border-radius: 10px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; line-height: 1.45;
      }
      .pop-status.ok { border-color: color-mix(in srgb, var(--ok) 40%, transparent); background: var(--ok-soft); color: var(--text); }
      .pop-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); flex: none; box-shadow: 0 0 8px var(--ok); }
      code { font-family: var(--mono); font-size: 0.85em; background: var(--panel-2); border: 1px solid var(--hair); padding: 1px 5px; border-radius: 5px; color: var(--text); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
