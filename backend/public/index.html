<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comms Assistant — Console</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">💬</span>
        <span>Comms Assistant <span class="muted">Console</span></span>
      </div>
      <nav class="tabs">
        <button class="tab active" data-view="contacts">Contacts</button>
        <button class="tab" data-view="settings">Settings</button>
      </nav>
      <div class="provider-badge" id="providerBadge" title="Active LLM provider">…</div>
    </header>

    <main>
      <!-- Contacts view -->
      <section id="view-contacts" class="view active">
        <div class="split">
          <aside class="list-pane">
            <input id="search" type="search" placeholder="Search contacts…" autocomplete="off" />
            <div class="list-meta" id="listMeta"></div>
            <ul id="contactList" class="contact-list"></ul>
          </aside>
          <article class="detail-pane" id="detailPane">
            <div class="empty" id="detailEmpty">Select a contact to see their profile and notes.</div>
            <div id="detail" hidden></div>
          </article>
        </div>
      </section>

      <!-- Settings view -->
      <section id="view-settings" class="view">
        <div class="settings-card">
          <h2>LLM provider</h2>
          <p class="muted">
            Pick a provider, paste a key, choose a model, then Apply. Changes take effect
            immediately — no restart. Keys are stored locally in <code>backend/.env</code> and
            never shown again after saving.
          </p>

          <label>Provider
            <select id="presetSelect"></select>
          </label>
          <p class="muted small" id="presetNote"></p>

          <div id="httpFields">
            <label>Base URL
              <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1" />
            </label>
            <label>Model
              <input id="model" type="text" list="modelList" placeholder="model name" />
              <datalist id="modelList"></datalist>
            </label>
            <label>API key
              <input id="apiKey" type="password" placeholder="leave blank to keep current key" autocomplete="off" />
            </label>
            <div class="current-key muted small" id="currentKey"></div>
          </div>

          <div class="btn-row">
            <button id="testBtn" class="btn ghost">Test connection</button>
            <button id="applyBtn" class="btn primary">Apply</button>
          </div>
          <div class="status" id="settingsStatus"></div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
